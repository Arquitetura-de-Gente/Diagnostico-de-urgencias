<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico de Urgências de RH — Arquitetura de Gente</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:#CC0000;font-family:'Montserrat',sans-serif;color:#fff}
body{padding:2.5rem 1.5rem}
.container{max-width:780px;margin:0 auto}
.header{text-align:center;margin-bottom:3rem}
.logo-img{width:100px;height:auto;margin:0 auto 1.2rem;display:block}
.header-eyebrow{font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;opacity:0.7;margin-bottom:10px}
.header h1{font-size:28px;font-weight:900;line-height:1.2;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.02em}
.header p{font-size:14px;font-weight:500;opacity:0.85;line-height:1.6;max-width:560px;margin:0 auto}
.progress-wrap{margin-bottom:2rem}
.progress-top{display:flex;justify-content:space-between;margin-bottom:8px}
.progress-top span{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;opacity:0.7}
.progress-bg{background:rgba(255,255,255,0.2);border-radius:2px;height:3px}
.progress-fill{height:3px;border-radius:2px;background:#fff;transition:width 0.4s ease}
.level-badge{display:inline-flex;align-items:center;gap:8px;margin-bottom:16px}
.level-icon{font-size:18px}
.level-text{font-size:10px;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;opacity:0.75}
.card{background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.15);border-radius:4px;padding:2rem;margin-bottom:1.5rem}
.card-title{font-size:18px;font-weight:800;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px;line-height:1.2}
.card-sub{font-size:13px;font-weight:500;opacity:0.75;margin-bottom:1.75rem;line-height:1.5}
.question{margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid rgba(255,255,255,0.12)}
.question:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.q-num{font-size:10px;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;opacity:0.55;margin-bottom:6px}
.q-text{font-size:14px;font-weight:700;line-height:1.55;margin-bottom:8px}
.q-hint{font-size:12px;font-weight:500;opacity:0.65;margin-bottom:14px;line-height:1.5;padding-left:12px;border-left:2px solid rgba(255,255,255,0.3)}
.options{display:flex;flex-wrap:wrap;gap:8px}
.opt-btn{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:2px;border:1px solid rgba(255,255,255,0.4);background:rgba(255,255,255,0.08);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600;color:#fff;cursor:pointer;transition:all 0.15s;text-align:left;line-height:1.4;letter-spacing:0.01em}
.opt-btn:hover{background:rgba(255,255,255,0.18);border-color:rgba(255,255,255,0.7)}
.checkbox{width:14px;height:14px;border:1.5px solid rgba(255,255,255,0.6);border-radius:1px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px}
.opt-btn.sel-0{background:rgba(0,0,0,0.4);border-color:rgba(255,255,255,0.9)}
.opt-btn.sel-1{background:rgba(0,0,0,0.3);border-color:rgba(255,255,255,0.75)}
.opt-btn.sel-2{background:rgba(255,255,255,0.2);border-color:#fff}
.opt-btn.sel-0 .checkbox,.opt-btn.sel-1 .checkbox,.opt-btn.sel-2 .checkbox{background:#fff;border-color:#fff;color:#CC0000}
.nav{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:1.5rem}
.btn-nav{padding:10px 28px;border-radius:2px;border:1.5px solid rgba(255,255,255,0.5);background:transparent;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:#fff;cursor:pointer;transition:all 0.15s}
.btn-nav:hover{background:rgba(255,255,255,0.12);border-color:#fff}
.btn-nav:disabled{opacity:0.3;cursor:not-allowed}
.btn-next{background:#fff;color:#CC0000;border-color:#fff}
.btn-next:hover{background:#f5f5f5}
.btn-next:disabled{background:rgba(255,255,255,0.2);color:rgba(255,255,255,0.4);border-color:rgba(255,255,255,0.2)}
.result-header{text-align:center;margin-bottom:2.5rem}
.result-eyebrow{font-size:10px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;opacity:0.6;margin-bottom:10px}
.result-score{font-size:72px;font-weight:900;line-height:1;margin-bottom:8px}
.result-label{display:inline-block;padding:5px 20px;border:1.5px solid rgba(255,255,255,0.6);border-radius:2px;font-size:11px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase}
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:2rem 0}
.score-card{background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.15);border-radius:4px;padding:1.25rem;text-align:center}
.score-card-num{font-size:32px;font-weight:900;margin-bottom:4px}
.score-card-lbl{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;opacity:0.6;line-height:1.4}
.gauge-section-title{font-size:10px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;opacity:0.6;margin-bottom:1rem}
.gauge-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.gauge-name{font-size:12px;font-weight:700;width:160px;flex-shrink:0;letter-spacing:0.02em}
.gauge-track{flex:1;background:rgba(0,0,0,0.3);border-radius:1px;height:5px;overflow:hidden}
.gauge-fill{height:5px;background:#fff;border-radius:1px;transition:width 0.6s ease}
.gauge-pct{font-size:12px;font-weight:800;width:36px;text-align:right;flex-shrink:0}
.insight-block{background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.15);border-radius:4px;padding:1.5rem;margin-bottom:1rem}
.insight-title{font-size:10px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;opacity:0.7;margin-bottom:12px}
.insight-item{font-size:13px;font-weight:500;line-height:1.6;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;align-items:baseline;gap:8px}
.insight-item:last-child{border-bottom:none}
.insight-num{font-size:10px;font-weight:800;opacity:0.5;flex-shrink:0}
.insight-name{font-size:10px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;background:rgba(255,255,255,0.15);padding:2px 8px;border-radius:1px;flex-shrink:0}
.ai-box{background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.15);border-radius:4px;padding:1.5rem;margin-top:1.5rem}
.ai-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.ai-dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}
.ai-dot.done{animation:none}
.ai-label{font-size:10px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;opacity:0.7}
.ai-loading{font-size:13px;font-weight:500;opacity:0.6;font-style:italic}
.ai-content{font-size:14px;font-weight:500;line-height:1.75;white-space:pre-wrap;opacity:0.9}
.restart-btn{width:100%;padding:12px;margin-top:1.5rem;border-radius:2px;border:1.5px solid rgba(255,255,255,0.35);background:transparent;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.6);cursor:pointer;transition:all 0.15s}
.restart-btn:hover{border-color:rgba(255,255,255,0.7);color:#fff;background:rgba(255,255,255,0.06)}
@media(max-width:520px){.score-grid{grid-template-columns:1fr}.options{flex-direction:column}.opt-btn{width:100%}}
</style>
</head>

    {q:"A empresa possui uma proposta clara do que oferece ao colaborador além do salário?",hint:"Ex.: plano de carreira definido, flexibilidade de horário, cultura de reconhecimento, benefícios diferenciados, propósito e ambiente de trabalho.",opts:["Não — sem proposta definida","Proposta informal ou em construção","Sim — proposta clara e comunicada"]}
  ]},
  {id:"n2c",level:2,levelLabel:"Nível 2 — Urgência Operacional",levelIcon:"⚠️",title:"Gestão de Benefícios",sub:"Insatisfação com benefícios gera desmotivação e pressão sobre a retenção.",questions:[
    {q:"O pacote de benefícios é competitivo com empresas do mesmo porte e setor?",hint:"Ex.: plano sem cobertura para dependentes, sem vale-alimentação, benefícios sem revisão há mais de dois anos.",opts:["Abaixo do mercado","Na média do mercado","Acima da média — diferencial competitivo"]},
    {q:"Existem reclamações recorrentes sobre a qualidade ou cobertura do plano de saúde?",hint:"Ex.: rede credenciada insuficiente, reembolsos demorados, coparticipação muito alta, sem cobertura para procedimentos básicos.",opts:["Sim — reclamações frequentes","Insatisfação pontual","Não — satisfação geral"]},
    {q:"Há revisão anual dos benefícios com base em pesquisa e dados?",hint:"Ex.: pesquisa de satisfação, comparação com o mercado, revisão do contrato com operadoras.",opts:["Não existe revisão formal","Revisão informal e esporádica","Sim — processo estruturado anualmente"]}
  ]},
  {id:"n3a",level:3,levelLabel:"Nível 3 — Urgência Estratégica",levelIcon:"✅",title:"Treinamento e Desenvolvimento",sub:"Lideranças e times precisam de capacidade para entregar a estratégia do negócio.",questions:[
    {q:"As lideranças estão preparadas para gerir equipes com autonomia e resultados?",hint:"Ex.: gestores que não delegam, equipes dependentes de aprovação para qualquer decisão, líderes sem capacitação em gestão de conflitos.",opts:["Não — sem preparo estruturado","Em desenvolvimento","Sim — lideranças capacitadas"]},
    {q:"Existe integração eficaz para novos colaboradores nos primeiros 90 dias?",hint:"Ex.: novo contratado deixado por conta própria na primeira semana, sem apresentação da cultura, sem acompanhamento da liderança.",opts:["Não existe integração estruturada","Processo básico e informal","Sim — integração estruturada e acompanhada"]},
    {q:"A empresa possui mapeamento de competências e trilhas de desenvolvimento por cargo?",hint:"Ex.: colaborador não sabe o que precisa desenvolver para ser promovido, treinamentos sem conexão com as necessidades do negócio.",opts:["Não existe mapeamento","Em construção","Sim — mapeamento ativo e atualizado"]}
  ]},
  {id:"n3b",level:3,levelLabel:"Nível 3 — Urgência Estratégica",levelIcon:"✅",title:"Avaliação de Desempenho e Retorno",sub:"Clareza sobre talentos e lacunas é essencial para decisões estratégicas de pessoas.",questions:[
    {q:"Há um ciclo estruturado de avaliação de desempenho com critérios e metas claras?",hint:"Ex.: avaliação feita só por impressão do gestor, sem critérios definidos, sem registros, ou apenas quando há problema.",opts:["Não existe ciclo formal","Avaliação informal e ocasional","Sim — ciclo estruturado e periódico"]},
    {q:"Os colaboradores recebem retorno claro e constante sobre seu desempenho?",hint:"Ex.: colaborador só recebe retorno negativo quando há erro grave, ausência de conversas de desenvolvimento entre gestor e equipe.",opts:["Não — cultura de retorno fraca","Retorno ocasional","Sim — cultura estabelecida de retorno contínuo"]},
    {q:"A empresa identifica e retém talentos de alta performance de forma proativa?",hint:"Ex.: sem mapeamento de sucessores, perda de talentos para concorrentes sem contraoferta, promoções por tempo de casa e não por entrega.",opts:["Não — sem programa estruturado","Em construção","Sim — programa ativo de retenção de talentos"]}
  ]},
  {id:"n3c",level:3,levelLabel:"Nível 3 — Urgência Estratégica",levelIcon:"✅",title:"Clima Organizacional e Engajamento",sub:"Cultura e engajamento determinam a sustentabilidade do crescimento.",questions:[
    {q:"Como você avalia o nível de motivação e energia do time no dia a dia?",hint:"Ex.: colaboradores apáticos, baixa participação em iniciativas, dificuldade em engajar o time em metas coletivas.",opts:["Baixo — desmotivação generalizada","Variado — oscila por área ou período","Alto — energia e engajamento positivos"]},
    {q:"Há sinais de esgotamento ou sobrecarga crônica em alguma área?",hint:"Ex.: afastamentos frequentes por ansiedade ou exaustão, colaboradores acumulando funções, horas extras sistemáticas sem compensação.",opts:["Sim — sinais evidentes em uma ou mais áreas","Sinais pontuais e isolados","Não — ambiente equilibrado"]},
    {q:"A empresa realiza pesquisa de clima e age sobre os resultados com planos concretos?",hint:"Ex.: última pesquisa há mais de dois anos, resultados nunca comunicados ao time, sem plano de ação após os dados.",opts:["Não realiza ou nunca agiu sobre os dados","Realiza, mas sem plano de ação claro","Sim — realiza e implementa ações com acompanhamento"]}
  ]}
];

const META={n1a:"Folha e DP",n1b:"SST",n1c:"Rel. Trabalhistas",n2a:"Recrutamento",n2b:"Retenção",n2c:"Benefícios",n3a:"T&D",n3b:"Desempenho",n3c:"Clima"};
let current=0,answers={};

function getScore(id){const a=answers[id];if(!a)return 0;const v=Object.values(a);return Math.round(v.reduce((s,x)=>s+x,0)/(v.length*2)*100);}
function render(){const area=document.getElementById("assessment-area");current<SECTIONS.length?renderSection(area):renderResult(area);}

function renderSection(area){
  const sec=SECTIONS[current],ans=answers[sec.id]||{};
  const prog=Math.round(((current+1)/SECTIONS.length)*100);
  const allDone=Object.keys(ans).length===sec.questions.length;
  area.innerHTML=`
    <div class="progress-wrap">
      <div class="progress-top"><span>Subsistema ${current+1} de ${SECTIONS.length}</span><span>${prog}%</span></div>
      <div class="progress-bg"><div class="progress-fill" style="width:${prog}%"></div></div>
    </div>
    <div class="card">
      <div class="level-badge"><span class="level-icon">${sec.levelIcon}</span><span class="level-text">${sec.levelLabel}</span></div>
      <div class="card-title">${sec.title}</div>
      <div class="card-sub">${sec.sub}</div>
      ${sec.questions.map((q,qi)=>`
        <div class="question">
          <div class="q-num">Pergunta ${qi+1}</div>
          <div class="q-text">${q.q}</div>
          ${q.hint?`<div class="q-hint">${q.hint}</div>`:""}
          <div class="options">
            ${q.opts.map((opt,oi)=>`
              <button class="opt-btn${ans[qi]===oi?' sel-'+oi:''}" onclick="pick(${qi},${oi})">
                <span class="checkbox">${ans[qi]===oi?'✓':''}</span>${opt}
              </button>`).join("")}
          </div>
        </div>`).join("")}
    </div>
    <div class="nav">
      <button class="btn-nav" onclick="goBack()" ${current===0?"disabled":""}>← Anterior</button>
      <button class="btn-nav btn-next" onclick="goNext()" ${!allDone?"disabled":""}>
        ${current===SECTIONS.length-1?"Ver diagnóstico →":"Próximo →"}
      </button>
    </div>`;
}

function pick(qi,oi){const id=SECTIONS[current].id;if(!answers[id])answers[id]={};answers[id][qi]=oi;render();}
function goNext(){current<SECTIONS.length-1?current++:current=SECTIONS.length;render();}
function goBack(){if(current>0){current--;render();}}

function renderResult(area){
  const scores={};SECTIONS.forEach(s=>scores[s.id]=getScore(s.id));
  const avg=ids=>Math.round(ids.reduce((a,id)=>a+scores[id],0)/ids.length);
  const s1=avg(["n1a","n1b","n1c"]),s2=avg(["n2a","n2b","n2c"]),s3=avg(["n3a","n3b","n3c"]);
  const total=Math.round(s1*0.5+s2*0.3+s3*0.2);
  const lbl=total<40?"Crítico":total<70?"Atenção":"Adequado";
  const criticals=SECTIONS.filter(s=>scores[s.id]<40);
  const attentions=SECTIONS.filter(s=>scores[s.id]>=40&&scores[s.id]<70);
  const prioList=[...SECTIONS].sort((a,b)=>scores[a.id]-scores[b.id]);
  area.innerHTML=`
    <div class="result-header">
      <div class="result-eyebrow">Score geral ponderado</div>
      <div class="result-score">${total}<span style="font-size:32px">%</span></div>
      <div class="result-label">${lbl}</div>
    </div>
    <div class="score-grid">
      <div class="score-card"><div class="score-card-num">${s1}%</div><div class="score-card-lbl">Nível 1<br>Urgência Crítica</div></div>
      <div class="score-card"><div class="score-card-num">${s2}%</div><div class="score-card-lbl">Nível 2<br>Urgência Operacional</div></div>
      <div class="score-card"><div class="score-card-num">${s3}%</div><div class="score-card-lbl">Nível 3<br>Urgência Estratégica</div></div>
    </div>
    <div class="card">
      <div class="gauge-section-title">Score por subsistema</div>
      ${SECTIONS.map(s=>`<div class="gauge-row">
        <div class="gauge-name">${META[s.id]}</div>
        <div class="gauge-track"><div class="gauge-fill" style="width:${scores[s.id]}%"></div></div>
        <div class="gauge-pct">${scores[s.id]}%</div>
      </div>`).join("")}
    </div>
    ${criticals.length>0?`<div class="insight-block">
      <div class="insight-title">🚨 Ação imediata — abaixo de 40%</div>
      ${criticals.map(s=>`<div class="insight-item"><span class="insight-name">${META[s.id]}</span><span>${SECTIONS.find(x=>x.id===s.id).title} — ${scores[s.id]}%</span></div>`).join("")}
    </div>`:""}
    ${attentions.length>0?`<div class="insight-block">
      <div class="insight-title">⚠️ Monitorar — entre 40% e 69%</div>
      ${attentions.map(s=>`<div class="insight-item"><span class="insight-name">${META[s.id]}</span><span>${SECTIONS.find(x=>x.id===s.id).title} — ${scores[s.id]}%</span></div>`).join("")}
    </div>`:""}
    <div class="insight-block">
      <div class="insight-title">Prioridade de intervenção sugerida</div>
      ${prioList.slice(0,5).map((s,i)=>`<div class="insight-item"><span class="insight-num">${i+1}º</span><span class="insight-name">${META[s.id]}</span><span>${SECTIONS.find(x=>x.id===s.id).title} — ${scores[s.id]}%</span></div>`).join("")}
    </div>
    <div class="ai-box">
      <div class="ai-header"><div class="ai-dot" id="ai-dot"></div><div class="ai-label">Análise por inteligência artificial</div></div>
      <div id="ai-out" class="ai-loading">Gerando recomendações personalizadas com base nos seus dados...</div>
    </div>
    <button class="restart-btn" onclick="restart()">↺ Refazer assessment</button>`;
  callAI(scores,s1,s2,s3,total,criticals,attentions);
}

async function callAI(scores,s1,s2,s3,total,criticals,attentions){
  const criNames=criticals.map(s=>SECTIONS.find(x=>x.id===s.id).title).join(", ")||"nenhum";
  const attNames=attentions.map(s=>SECTIONS.find(x=>x.id===s.id).title).join(", ")||"nenhum";
  const breakdown=SECTIONS.map(s=>`${SECTIONS.find(x=>x.id===s.id).title}: ${scores[s.id]}%`).join(" | ");
  const prompt=`Você é consultora sênior de RH Estratégico, especialista em Arquitetura de Gente. Analise os dados abaixo e forneça um diagnóstico executivo conciso e prático.

Dados:
- Score geral: ${total}%
- Nível 1 (Conformidade): ${s1}% | Nível 2 (Operacional): ${s2}% | Nível 3 (Estratégico): ${s3}%
- Subsistemas críticos (<40%): ${criNames}
- Subsistemas em atenção (40-69%): ${attNames}
- Detalhamento: ${breakdown}

Forneça em 4 blocos sem usar asteriscos nem palavras em inglês:
1. Leitura do solo (2-3 frases sobre o estado geral)
2. Ação prioritária imediata (máx 2 itens concretos)
3. Risco ignorado (o fantasma organizacional que os dados revelam)
4. Próximo passo estratégico (o que apresentar para a diretoria)

Máx 250 palavras. Direto e estratégico.`;
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})
    });
    const d=await r.json();
    const text=d.content?.map(i=>i.text||"").join("")||"Não foi possível gerar a análise.";
    document.getElementById("ai-dot").classList.add("done");
    const el=document.getElementById("ai-out");el.className="ai-content";el.textContent=text;
  }catch(e){
    document.getElementById("ai-dot").classList.add("done");
    document.getElementById("ai-out").textContent="Não foi possível conectar ao serviço de análise. Para que a análise funcione, o arquivo precisa estar hospedado em um servidor com acesso à API.";
  }
}

function restart(){current=0;answers={};render();}
render();
</script>
</body>
</html>
